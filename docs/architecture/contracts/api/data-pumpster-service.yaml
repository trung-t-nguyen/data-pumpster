openapi: 3.1.0
info:
  title: Data Pumpster API
  version: 1.0.0

paths:
  /api/v1/import/jobs:
    get:
      summary: List all import jobs
      description: >
        Returns all import jobs ordered by start time, most recent first.
        Includes jobs in every state (pending, processing, completed, failed).
        Used by the history view to render the import audit table.
      operationId: listImportJobs
      responses:
        '200':
          description: All import jobs, sorted most-recent first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImportJobSummary'
              examples:
                withJobs:
                  value:
                    - id: "205154a0-95cd-4a0e-92a2-c2e53c0cb595"
                      status: "completed"
                      totalRows: 500
                      insertedRows: 490
                      skippedRows: 10
                      errorDescription: null
                      startedAt: "2026-05-11T10:00:00Z"
                      completedAt: "2026-05-11T10:00:42Z"
                    - id: "11111111-0000-0000-0000-000000000001"
                      status: "failed"
                      totalRows: 200
                      insertedRows: 0
                      skippedRows: 0
                      errorDescription: "COPY failed: invalid data on row 3"
                      startedAt: "2026-05-10T09:00:00Z"
                      completedAt: "2026-05-10T09:00:05Z"
                empty:
                  value: []
        '500':
          description: Unexpected server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

    post:
      summary: Submit a new import job
      description: >
        Accepts a CSV file and a column-mapping object. Creates an ImportJob
        record in `pending` state, acknowledges immediately with 202, then
        processes the file asynchronously using the PostgreSQL COPY protocol.
      operationId: submitImportJob
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - mapping
              properties:
                file:
                  type: string
                  format: binary
                  description: The CSV file to import.
                mapping:
                  type: string
                  format: json
                  description: >
                    JSON-encoded object mapping each database column to the
                    corresponding CSV header. Only required fields (sku, name,
                    price) must be present and non-empty. Optional fields may
                    be omitted or set to empty string (stored as NULL).
                  example: '{"sku":"sku","name":"product_name","price":"unit_price","brand":"brand_name"}'
                totalRows:
                  type: integer
                  description: >
                    Client-side estimate of data row count (headers excluded).
                    Stored as `total_rows` on the job for progress display.
                    Optional — null if the client could not determine it.
      responses:
        '202':
          description: Job accepted and queued for background processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAccepted'
        '400':
          description: Invalid request — missing required mapping fields or malformed payload.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              examples:
                missingRequiredField:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "Required mapping field 'sku' is missing or empty."
                    instance: /api/v1/import/jobs
                malformedMapping:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "Field 'mapping' is not valid JSON."
                    instance: /api/v1/import/jobs
        '500':
          description: Unexpected server error during job creation.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/import/jobs/{jobId}/events:
    get:
      summary: Stream import job progress events via SSE
      description: >
        Opens a Server-Sent Events stream for the specified job. Emits a
        `processing` event when the import starts and a `completed` or `failed`
        event when it finishes, then closes the stream. If the job has already
        reached a terminal state before the client connects, the terminal event
        is emitted immediately. Supports `Last-Event-ID` for reconnection —
        only events with `eventId` greater than the supplied value are replayed.
      operationId: streamJobEvents
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the import job to monitor.
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: integer
            format: int64
          description: >
            Last SSE event ID received by the client. When provided, only events
            with an `eventId` greater than this value are replayed.
      responses:
        '200':
          description: SSE stream of progress events (Content-Type: text/event-stream).
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ProgressEvent'
              examples:
                processing:
                  value: |
                    id: 1
                    data: {"eventId":1,"status":"processing","insertedRows":0,"skippedRows":0,"totalRows":500}

                completed:
                  value: |
                    id: 2
                    data: {"eventId":2,"status":"completed","insertedRows":490,"skippedRows":10,"totalRows":500}

                failed:
                  value: |
                    id: 2
                    data: {"eventId":2,"status":"failed","insertedRows":0,"skippedRows":0,"totalRows":500,"errorDescription":"Unexpected error during COPY"}

        '404':
          description: No import job found with the given ID.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: "Import job not found: 205154a0-95cd-4a0e-92a2-c2e53c0cb595"
                    instance: /api/v1/import/jobs/205154a0-95cd-4a0e-92a2-c2e53c0cb595/events

components:
  schemas:
    ProgressEvent:
      type: object
      required:
        - eventId
        - status
        - insertedRows
        - skippedRows
      properties:
        eventId:
          type: integer
          format: int64
          description: Sequential event identifier used for Last-Event-ID replay.
        status:
          type: string
          enum: [processing, completed, failed]
          description: Current job status at the time of this event.
        insertedRows:
          type: integer
          description: Rows successfully written to the products table so far.
        skippedRows:
          type: integer
          description: Rows skipped due to constraint violations (e.g. duplicate SKU).
        totalRows:
          type: integer
          nullable: true
          description: Client-supplied estimate of total data rows; null if unknown.
        errorDescription:
          type: string
          nullable: true
          description: Human-readable failure reason; non-null only when status = failed.

    JobAccepted:
      type: object
      required:
        - jobId
      properties:
        jobId:
          type: string
          format: uuid
          description: Unique identifier of the created import job.
          example: 205154a0-95cd-4a0e-92a2-c2e53c0cb595

    ImportJobSummary:
      type: object
      required:
        - id
        - status
        - insertedRows
        - skippedRows
        - startedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier of the import job.
        status:
          type: string
          enum: [pending, processing, completed, failed]
          description: Current job state.
        totalRows:
          type: integer
          nullable: true
          description: Client-supplied estimate of total data rows; null if unknown.
        insertedRows:
          type: integer
          description: Rows successfully written to the products table.
        skippedRows:
          type: integer
          description: Rows skipped due to constraint violations (e.g. duplicate SKU).
        errorDescription:
          type: string
          nullable: true
          description: Human-readable failure reason; non-null only when status = failed.
        startedAt:
          type: string
          format: date-time
          description: Timestamp when the job record was created (server time, UTC).
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the job reached a terminal state; null while in progress.

    ProblemDetail:
      type: object
      description: RFC 9457 Problem Details for HTTP APIs.
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
