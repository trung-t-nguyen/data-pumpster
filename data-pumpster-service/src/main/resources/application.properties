spring.application.name=data-pumpster-service

spring.datasource.url=jdbc:postgresql://localhost:5432/data_pumpster
spring.datasource.username=data_pumpster
spring.datasource.password=data_pumpster
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Allow up to 100 MB multipart uploads in-memory
spring.codec.max-in-memory-size=104857600

# Emit RFC 9457 Problem Detail bodies for ResponseStatusException
spring.webflux.problemdetails.enabled=true

spring.docker.compose.enabled=false

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

logging.level.com.ttng.pumpster=DEBUG
logging.level.org.springframework=DEBUG

